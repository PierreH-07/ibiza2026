<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ponton · Ibiza 2026 · 10km</title>
<style>
:root{
  --ffn-blue:#003087;--ffn-red:#C8102E;--ffn-light:#c6ddf0;
  --bg:#f0f5fb;--surf:#fff;--surf2:#eef3fa;--surf3:#e4edf8;
  --border:#d0dce8;--txt:#1a2a4a;--txt-dim:#6b7f9e;--txt-bright:#0a1628;
  --gold:#b8860b;--silver:#6b7f9e;--panel-w:min(360px,92vw);
  --hdr-h:0px;--fbar-h:0px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);}
body{font-family:'Helvetica Neue',Arial,system-ui,-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:max(env(safe-area-inset-top),10px) 16px 8px;
  background:var(--ffn-blue);border-bottom:3px solid var(--ffn-red);
  position:fixed;top:0;left:0;right:0;z-index:300;
}
.hdr-title{font-size:clamp(12px,3.5vw,17px);font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#fff;line-height:1;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.tabs{display:flex;gap:4px;flex-shrink:0;}
.tab{font-size:12px;font-weight:700;text-transform:uppercase;padding:6px 13px;border-radius:3px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.55);cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab.on{background:var(--ffn-red);border-color:var(--ffn-red);color:#fff;}

/* ── VIEW TABS ── */
.vtabs{
  display:flex;gap:0;
  background:var(--ffn-blue);
  position:fixed;z-index:299;left:0;right:0;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.vtab{
  flex:1;text-align:center;padding:8px 4px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  color:rgba(255,255,255,.45);cursor:pointer;transition:all .18s;
  border-bottom:3px solid transparent;
}
.vtab.on{color:#fff;border-bottom-color:var(--ffn-red);}
.vtab:hover:not(.on){color:rgba(255,255,255,.7);}

/* ── FILTER BAR ── */
.filters{
  display:flex;align-items:center;gap:6px;flex-wrap:nowrap;
  padding:6px 14px;background:#e8f0f8;border-bottom:1px solid var(--border);
  position:fixed;z-index:298;left:0;right:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.flabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);font-weight:700;white-space:nowrap;}
.fsel{background:var(--surf);border:1px solid var(--border);color:var(--txt);padding:4px 8px;border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit;}
.chip{font-size:10px;padding:3px 9px;border-radius:20px;border:1.5px solid var(--border);background:var(--surf);color:var(--txt-dim);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.chip.on{background:var(--ffn-blue);border-color:var(--ffn-blue);color:#fff;}

/* ── LAYOUT ── */
.main-layout{display:flex;height:100%;}
.left-col{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 10px calc(env(safe-area-inset-bottom)+20px);}
.ponton-info{font-size:11px;color:var(--txt-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}

/* ── PANEL ── */
.panel-overlay{position:fixed;inset:0;background:rgba(0,30,80,.45);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;}
.panel-overlay.show{opacity:1;pointer-events:all;}
.panel{
  position:fixed;right:0;top:0;bottom:0;width:var(--panel-w);
  background:var(--surf);border-left:2px solid var(--ffn-blue);
  overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:401;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:calc(env(safe-area-inset-bottom)+16px);
}
.panel.show{transform:translateX(0);}
@media(min-width:820px){
  .panel-overlay{display:none!important;}
  .panel{position:static;transform:none!important;width:var(--panel-w);min-width:var(--panel-w);flex-shrink:0;border-left:2px solid var(--ffn-blue);}
  .main-layout{overflow:hidden;}
}
.panel-close{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--ffn-blue);}
.close-label{font-size:11px;color:rgba(255,255,255,.8);font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
.close-btn{background:var(--ffn-red);border:none;color:#fff;padding:5px 12px;border-radius:3px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;flex-shrink:0;}

/* ── PANEL VIEW SWITCHER ── */
.panel-vtabs{display:flex;background:var(--surf3);border-bottom:1px solid var(--border);}
.panel-vtab{flex:1;padding:8px 4px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-dim);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;}
.panel-vtab.on{color:var(--ffn-blue);border-bottom-color:var(--ffn-blue);}

/* ── FICHE PROFIL ── */
.fiche{padding:14px 14px 24px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fiche-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.bib-badge{width:42px;height:42px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;background:var(--ffn-blue);}
.fiche-name{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--txt-bright);line-height:1.1;}
.fiche-meta{font-size:11px;color:var(--txt-dim);margin-top:3px;}
.resp-badge{display:inline-flex;align-items:center;gap:5px;margin-top:5px;padding:3px 9px;background:var(--surf2);border:1.5px solid var(--ffn-blue);border-radius:20px;font-size:11px;}
.resp-icon{font-size:14px;font-weight:900;color:var(--ffn-blue);}
.resp-label{color:var(--ffn-blue);font-weight:600;}

.sect-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ffn-blue);padding-bottom:5px;margin-bottom:7px;border-bottom:2px solid var(--ffn-blue);}
.sect{margin-bottom:14px;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.tcell{background:var(--surf2);border-radius:3px;padding:6px 8px;}
.tlabel{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-dim);font-weight:600;}
.tval{font-size:16px;font-weight:800;color:var(--txt-bright);margin-top:1px;}
.tval.nd{font-size:12px;color:#bbc8d8;font-weight:400;}
.exp-wrap{background:var(--surf2);border-radius:3px;padding:8px 10px;}
.exp-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;color:var(--txt);}
.exp-bar-bg{height:7px;background:var(--border);border-radius:3px;overflow:hidden;}
.exp-bar{height:100%;border-radius:3px;transition:width .4s ease;}

/* ── RÉSULTATS ── */
.rlist{display:flex;flex-direction:column;gap:4px;}
.ritem{display:flex;align-items:center;gap:8px;background:var(--surf2);border-radius:3px;padding:5px 8px;font-size:11px;cursor:pointer;transition:background .15s;}
.ritem:hover{background:var(--surf3);}
.ritem.selected{background:var(--ffn-light);border-left:3px solid var(--ffn-blue);}
.rrank{font-size:16px;font-weight:800;width:24px;text-align:center;flex-shrink:0;}
.top1{color:var(--gold);} .top3{color:#cd7c3a;} .top10{color:var(--ffn-blue);} .other{color:var(--txt-dim);}
.rcourse{color:var(--txt);flex:1;}
.rbadge{font-size:9px;padding:2px 5px;border-radius:10px;font-weight:700;flex-shrink:0;}
.rbadge-cdm{background:#e0ecff;color:var(--ffn-blue);}
.rbadge-chm{background:#fff0e0;color:#a05000;}
.rbadge-jo{background:#ffe0e0;color:var(--ffn-red);}
.rbadge-che{background:#e0f5e0;color:#006020;}
.empty-r{font-size:11px;color:#bbc8d8;font-style:italic;padding:8px 0;}

/* ── COURSE DETAIL ── */
.course-detail{padding:14px 14px 24px;animation:fadeIn .2s ease;}
.course-title{font-size:14px;font-weight:800;color:var(--txt-bright);margin-bottom:4px;}
.course-meta{font-size:11px;color:var(--txt-dim);margin-bottom:14px;}
.stat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.stat-pill{background:var(--surf2);border-radius:4px;padding:6px 10px;text-align:center;flex:1;min-width:60px;}
.stat-val{font-size:18px;font-weight:800;color:var(--txt-bright);}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-top:2px;}
.stat-val.top1c{color:var(--gold);}
.stat-val.top3c{color:#cd7c3a;}
.stat-val.top10c{color:var(--ffn-blue);}

/* ── P EMPTY ── */
.p-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:10px;color:var(--txt-dim);font-size:12px;text-align:center;padding:24px;}
.p-empty-icon{font-size:40px;opacity:.2;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="hdr" id="hdr">
  <div>
    <div class="hdr-title">🏊 Ponton · 10km Ibiza 2026</div>
    <div class="hdr-sub">World Cup Stop 2 · 24 avril 2026 · FFN Service Performance</div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tf" onclick="switchGender('f')">♀ Femmes</button>
    <button class="tab" id="th" onclick="switchGender('h')">♂ Hommes</button>
  </div>
</div>

<div class="vtabs" id="vtabs">
  <div class="vtab on" id="vtab-hist">📊 Ponton</div>
</div>

<div class="filters" id="fbar">
  <span class="flabel">Tri :</span>
  <select class="fsel" id="sort" onchange="renderHist()">
    <option value="bib">BIB</option>
    <option value="v15">Vitesse 1500 ↓</option>
    <option value="v400">Vitesse 400 ↓</option>
    <option value="exp">Expérience ↓</option>
    <option value="noc">Nation</option>
  </select>
  <span class="flabel">Nation :</span>
  <div id="chips" style="display:flex;gap:4px;flex-wrap:nowrap;"></div>
</div>

<div class="main-layout" id="main-layout">

  <div class="left-col" id="left-col">
    <div class="ponton-info" id="pinfo"></div>
    <div id="hist-container" style="width:100%;"></div>
  </div>

  <div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="panel-close">
      <span class="close-label" id="panel-title">Fiche nageur</span>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-vtabs">
      <div class="panel-vtab on" id="pvtab-profil" onclick="setPanelView('profil')">👤 Profil</div>
      <div class="panel-vtab" id="pvtab-courses" onclick="setPanelView('courses')">📋 Courses</div>
      <div class="panel-vtab" id="pvtab-course-detail" onclick="setPanelView('course-detail')">📈 Détail</div>
    </div>
    <div class="p-empty" id="pempty">
      <div class="p-empty-icon">📊</div>
      <div>Cliquez sur une barre<br>pour voir la fiche</div>
    </div>
    <div id="fiche-content"></div>
  </div>

</div>

let G='f', SEL=null, NOC_FILT=null, PANEL_VIEW='profil', SEL_COURSE=null;

const data = () => G==='f' ? DATA_F : DATA_H;

// ── Couleurs ──────────────────────────────────────────────────
function expColor(e){
  const t=Math.min(1,(e||0)/80);
  return 'rgb('+Math.round(109-t*109)+','+Math.round(168-t*120)+','+Math.round(212-t*76)+')';
}
function vColor(v){
  if(!v) return '#6da8d4';
  const max=G==='f'?1.65:1.82, min=G==='f'?1.35:1.50;
  const t=Math.max(0,Math.min(1,(v-min)/(max-min)));
  return 'rgb('+Math.round(230-t*190)+','+Math.round(48+t*60)+','+Math.round(90+t*165)+')';
}
function rangColor(r){
  return r===1?'top1':r<=3?'top3':r<=10?'top10':'other';
}
function typeBadge(type){
  const cls={CDM:'rbadge-cdm',CHM:'rbadge-chm',JO:'rbadge-jo',CHE:'rbadge-che'}[type]||'rbadge-cdm';
  return '<span class="rbadge '+cls+'">'+type+'</span>';
}

// ── Layout ────────────────────────────────────────────────────
function setTop(){
  const hh=document.getElementById('hdr').offsetHeight;
  const vh=document.getElementById('vtabs').offsetHeight;
  const fh=document.getElementById('fbar').offsetHeight;
  const total=hh+vh+fh;
  document.getElementById('main-layout').style.paddingTop=total+'px';
  document.getElementById('vtabs').style.top=hh+'px';
  document.getElementById('fbar').style.top=(hh+vh)+'px';
}

// ── Chips ─────────────────────────────────────────────────────
function buildChips(){
  const nocs=[...new Set(data().map(d=>d.noc))].sort();
  const wrap=document.getElementById('chips');
  wrap.innerHTML='';
  const mk=(lbl,noc)=>{
    const b=document.createElement('button');
    b.className='chip'+(NOC_FILT===noc?' on':'');
    b.textContent=lbl;
    b.onclick=()=>{NOC_FILT=NOC_FILT===noc?null:noc;buildChips();renderHist();};
    wrap.appendChild(b);
  };
  mk('Tous',null);
  nocs.forEach(n=>mk((NOC_FLAGS[n]||'')+' '+n,n));
}

// ── Sort/filter ───────────────────────────────────────────────
function sorted(){
  let d=[...data()];
  if(NOC_FILT) d=d.filter(x=>x.noc===NOC_FILT);
  const s=document.getElementById('sort').value;
  if(s==='bib') d.sort((a,b)=>a.bib-b.bib);
  else if(s==='v15') d.sort((a,b)=>(b.v1500||0)-(a.v1500||0));
  else if(s==='v400') d.sort((a,b)=>(b.v400||0)-(a.v400||0));
  else if(s==='exp') d.sort((a,b)=>(b.experience||0)-(a.experience||0));
  else d.sort((a,b)=>a.noc.localeCompare(b.noc)||a.bib-b.bib);
  return d;
}

// ── Histogram ─────────────────────────────────────────────────
function renderHist(){
  const d=sorted();
  document.getElementById('pinfo').textContent=
    d.length+' nageur'+(G==='h'?'s':'ses')+(NOC_FILT?' · '+NOC_FILT:'');

  const container=document.getElementById('hist-container');
  const W=Math.max(container.clientWidth||600, d.length*12+80);
  const marginL=48,marginR=12,marginT=28,marginB=170;
  const chartW=W-marginL-marginR, chartH=260;
  const svgH=chartH+marginT+marginB;

  const allV=d.flatMap(x=>[x.v1500,x.v400].filter(v=>v!=null));
  const vMin=allV.length?Math.max(1.20,Math.min(...allV)-0.05):1.20;
  const vMax=allV.length?Math.min(1.90,Math.max(...allV)+0.05):1.90;
  const barW=Math.max(6,Math.min(28,(chartW/d.length)-2));
  const gap=chartW/d.length;
  const yScale=v=>chartH-((v-vMin)/(vMax-vMin))*chartH;
  const xCenter=i=>marginL+gap*i+gap/2;

  const yTicks=[];
  let tick=Math.ceil(vMin*10)/10;
  while(tick<=vMax+0.001){yTicks.push(+tick.toFixed(2));tick=+(tick+0.1).toFixed(2);}

  let svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" viewBox="0 0 '+W+' '+svgH+'" style="display:block">';
  svg+='<defs><pattern id="hatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">'
    +'<line x1="0" y1="0" x2="0" y2="4" stroke="#7aaecf" stroke-width="1.5"/></pattern></defs>';
  svg+='<rect width="'+W+'" height="'+svgH+'" fill="#f5f8fc"/>';
  svg+='<rect x="'+marginL+'" y="'+marginT+'" width="'+chartW+'" height="'+chartH+'" fill="white" rx="2"/>';

  yTicks.forEach(v=>{
    const y=marginT+yScale(v);
    svg+='<line x1="'+marginL+'" y1="'+y+'" x2="'+(marginL+chartW)+'" y2="'+y+'" stroke="#dde5f0" stroke-width="1" stroke-dasharray="3,2"/>';
    svg+='<text x="'+(marginL-5)+'" y="'+(y+4)+'" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#6b7f9e">'+v.toFixed(1)+'</text>';
  });
  svg+='<text transform="rotate(-90,16,'+(marginT+chartH/2)+')" x="16" y="'+(marginT+chartH/2)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6b7f9e" font-weight="600">Vitesse (m/s)</text>';

  d.forEach((ng,i)=>{
    const cx=xCenter(i);
    const isSel=ng.bib===SEL;
    const isFR=ng.noc==='FRA';
    const bColor=expColor(ng.experience||0);
    const bStroke=isSel?'#C8102E':isFR?'#C8102E':'#7aaecf';
    const bStrokeW=isSel||isFR?1.5:0.8;

    if(ng.v1500){
      const bY=marginT+yScale(ng.v1500), bH=chartH-yScale(ng.v1500);
      svg+='<rect x="'+(cx-barW/2)+'" y="'+bY+'" width="'+barW+'" height="'+bH+'"'
        +' fill="'+bColor+'" stroke="'+bStroke+'" stroke-width="'+bStrokeW+'" rx="1"'
        +' style="cursor:pointer" onclick="tap('+ng.bib+')"/>';
    }
    if(ng.v400){
      const dy=marginT+yScale(ng.v400);
      const baseY=ng.v1500?(marginT+yScale(ng.v1500)):(marginT+chartH);
      svg+='<line x1="'+cx+'" y1="'+dy+'" x2="'+cx+'" y2="'+baseY+'" stroke="#003087" stroke-width="1" stroke-dasharray="3,2"/>';
      svg+='<circle cx="'+cx+'" cy="'+dy+'" r="3.5" fill="#003087" style="cursor:pointer" onclick="tap('+ng.bib+')"/>';
    }
    if(isFR){
      const topY=ng.v1500?(marginT+yScale(ng.v1500)-4):(marginT+chartH-4);
      svg+='<text x="'+cx+'" y="'+topY+'" text-anchor="middle" font-size="11">🇫🇷</text>';
    }
    if(isSel) svg+='<rect x="'+(marginL)+'" y="'+marginT+'" width="'+chartW+'" height="'+chartH+'" fill="rgba(200,16,46,0)" rx="0"/>'
      +'<rect x="'+(cx-barW/2-2)+'" y="'+marginT+'" width="'+(barW+4)+'" height="'+chartH+'" fill="rgba(200,16,46,0.06)" rx="2"/>';

    svg+='<rect x="'+(cx-gap/2)+'" y="'+marginT+'" width="'+gap+'" height="'+chartH+'" fill="transparent" style="cursor:pointer" onclick="tap('+ng.bib+')"/>';

    const lblY=marginT+chartH+14;
    svg+='<text x="'+cx+'" y="'+lblY+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="'+(isSel?'#C8102E':'#6b7f9e')+'" font-weight="'+(isSel?'700':'400')+'">'+ng.bib+'</text>';
    const shortName=ng.nom.length>16?ng.nom.split(' ')[0]:ng.nom;
    const nameY=marginT+chartH+22;
    svg+='<text transform="rotate(-55,'+cx+','+(nameY+8)+')" x="'+cx+'" y="'+(nameY+8)+'"'
      +' text-anchor="end" font-family="Arial,sans-serif" font-size="8.5" fill="'+(isSel?'#C8102E':isFR?'#C8102E':'#4a5f7a')+'"'
      +' font-weight="'+(isFR?'700':'400')+'">'+shortName+'</text>';
  });

  svg+='<rect x="'+marginL+'" y="'+marginT+'" width="'+chartW+'" height="'+chartH+'" fill="none" stroke="#c5d4e8" stroke-width="1" rx="2"/>';

  // Légende
  const legY1=marginT+chartH+126, legY2=legY1+24, legX=marginL;
  svg+='<rect x="'+(legX-4)+'" y="'+(legY1-14)+'" width="'+(chartW+8)+'" height="46" rx="4" fill="#eef3fa" stroke="#d0dce8" stroke-width="0.8"/>';
  svg+='<rect x="'+legX+'" y="'+(legY1-10)+'" width="12" height="12" rx="1" fill="#6da8d4" stroke="#7aaecf" stroke-width="0.8"/>';
  svg+='<text x="'+(legX+16)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Vitesse 1500</text>';
  const sepX=legX+120;
  svg+='<line x1="'+sepX+'" y1="'+(legY1-6)+'" x2="'+sepX+'" y2="'+(legY1+2)+'" stroke="#003087" stroke-width="1.2" stroke-dasharray="2.5,2"/>';
  svg+='<circle cx="'+sepX+'" cy="'+(legY1-8)+'" r="3.5" fill="#003087"/>';
  svg+='<text x="'+(sepX+9)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Vitesse 400</text>';
  const frX=legX+230;
  svg+='<text x="'+frX+'" y="'+legY1+'" font-size="11">🇫🇷</text>';
  svg+='<text x="'+(frX+16)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9.5" fill="#C8102E" font-weight="600">Français(e)</text>';
  svg+='<text x="'+(legX)+'" y="'+legY2+'" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Expérience :</text>';
  const gradX=legX+74, steps=10, stepW=14;
  for(let ei=0;ei<=steps;ei++){
    const c=expColor(ei*8);
    svg+='<rect x="'+(gradX+ei*stepW)+'" y="'+(legY2-10)+'" width="'+stepW+'" height="10" fill="'+c+'"/>';
  }
  svg+='<rect x="'+gradX+'" y="'+(legY2-10)+'" width="'+(steps*stepW+stepW)+'" height="10" fill="none" stroke="#c0cfe0" stroke-width="0.8"/>';
  svg+='<text x="'+gradX+'" y="'+(legY2+8)+'" font-family="Arial,sans-serif" font-size="8" fill="#6b7f9e">0</text>';
  svg+='<text x="'+(gradX+steps*stepW+stepW)+'" y="'+(legY2+8)+'" font-family="Arial,sans-serif" font-size="8" fill="#003087" font-weight="600" text-anchor="end">80+</text>';
  svg+='<text x="'+(legX+350)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9" fill="#7aaecf" font-style="italic">← cliquer pour la fiche</text>';
  svg+='</svg>';

  container.innerHTML=svg;
  container.style.minWidth=W+'px';
}

// ── Tap ───────────────────────────────────────────────────────
function tap(bib){
  const ng=data().find(x=>x.bib===bib);
  if(!ng) return;
  SEL=SEL===bib?null:bib;
  SEL_COURSE=null;
  renderHist();
  if(SEL){
    PANEL_VIEW='profil';
    showPanel(ng);
  } else {
    closePanel();
  }
}

function closePanel(){
  SEL=null; SEL_COURSE=null;
  renderHist();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  document.getElementById('fiche-content').innerHTML='';
  document.getElementById('pempty').style.display='flex';
}

// ── Panel ─────────────────────────────────────────────────────
function showPanel(ng){
  document.getElementById('panel-title').textContent=ng.nom;
  document.getElementById('pempty').style.display='none';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
  setPanelView(PANEL_VIEW, ng);
}

function setPanelView(view, ngArg){
  PANEL_VIEW=view;
  const ng=ngArg||(data().find(x=>x.bib===SEL));
  if(!ng) return;
  ['profil','courses','course-detail'].forEach(v=>{
    document.getElementById('pvtab-'+v).classList.toggle('on',v===view);
  });
  if(view==='profil') renderProfil(ng);
  else if(view==='courses') renderCoursesList(ng);
  else if(view==='course-detail' && SEL_COURSE!=null) renderCourseDetail(ng, SEL_COURSE);
}

// ── PROFIL ────────────────────────────────────────────────────
function renderProfil(ng){
  const flag=NOC_FLAGS[ng.noc]||'';
  const annee=ng.annee||'—';
  const age=ng.annee?(2026-ng.annee)+' ans':'';
  const isF=G==='f';
  const expPct=Math.min(100,(ng.experience||0)/80*100);

  const tcell=(lbl,v)=>'<div class="tcell"><div class="tlabel">'+lbl+'</div><div class="tval'+(v?'':' nd')+'">'+(v||'—')+'</div></div>';
  const vtcell=(lbl,v)=>v?'<div class="tcell" style="border:1px solid #003087;background:#eef3fa"><div class="tlabel">'+lbl+'</div><div class="tval" style="color:#003087">'+v.toFixed(4)+'</div></div>':'';

  const times=isF
    ?tcell('100 NL',ng.t100)+tcell('200 NL',ng.t200)+tcell('400 NL',ng.t400)+tcell('800 NL',ng.t800)+tcell('1500 NL',ng.t1500)+vtcell('V. 400',ng.v400)+vtcell('V. 1500',ng.v1500)
    :tcell('400 NL',ng.t400)+tcell('800 NL',ng.t800)+tcell('1500 NL',ng.t1500)+vtcell('V. 400',ng.v400)+vtcell('V. 1500',ng.v1500);

  const respHtml=ng.respiration?('<div class="resp-badge"><span class="resp-icon">'+(ng.respiration.includes('Gauche et')?'↔':ng.respiration.includes('Gauche')?'←':'→')+'</span><span class="resp-label">Respiration '+ng.respiration+'</span></div>'):'';

  // Statistiques globales
  const nbCourses=ng.courses?ng.courses.length:0;
  const meilleursRangs=ng.courses?ng.courses.filter(c=>c.rang<=3).length:0;
  const top10=ng.courses?ng.courses.filter(c=>c.rang<=10).length:0;
  const rangMoyen=nbCourses>0?Math.round(ng.courses.reduce((s,c)=>s+c.rang,0)/nbCourses):null;

  document.getElementById('fiche-content').innerHTML=
    '<div class="fiche">'+
    '<div class="fiche-hdr">'+
    '<div class="bib-badge">'+ng.bib+'</div>'+
    '<div><div class="fiche-name">'+ng.nom+'</div>'+
    '<div class="fiche-meta">'+flag+' '+ng.noc+(annee!=='—'?' · '+annee+(age?' ('+age+')':''):'')+'</div>'+
    respHtml+'</div></div>'+

    '<div class="sect"><div class="sect-title">📊 Statistiques EL</div>'+
    '<div class="stat-row">'+
    '<div class="stat-pill"><div class="stat-val">'+nbCourses+'</div><div class="stat-lbl">Courses</div></div>'+
    (meilleursRangs?'<div class="stat-pill"><div class="stat-val top3c">'+meilleursRangs+'</div><div class="stat-lbl">Podiums</div></div>':'')+
    (top10?'<div class="stat-pill"><div class="stat-val top10c">'+top10+'</div><div class="stat-lbl">Top 10</div></div>':'')+
    (rangMoyen?'<div class="stat-pill"><div class="stat-val">'+rangMoyen+'e</div><div class="stat-lbl">Rang moy.</div></div>':'')+
    '</div></div>'+

    '<div class="sect"><div class="sect-title">⏱ Temps piscine</div>'+
    '<div class="tgrid">'+times+'</div></div>'+

    '<div class="sect"><div class="sect-title">📈 Expérience</div>'+
    '<div class="exp-wrap">'+
    '<div class="exp-row"><span>'+(ng.experience||0)+' courses</span><span style="font-size:10px;color:#aaa">/ 80 ref.</span></div>'+
    '<div class="exp-bar-bg"><div class="exp-bar" style="width:'+expPct+'%;background:linear-gradient(90deg,#c6ddf0,#003087)"></div></div>'+
    '</div></div>'+
    '</div>';
}

// ── LISTE DES COURSES ─────────────────────────────────────────
function renderCoursesList(ng){
  const courses=ng.courses||[];
  if(courses.length===0){
    document.getElementById('fiche-content').innerHTML='<div class="fiche"><div class="empty-r">Aucune course dans la base</div></div>';
    return;
  }

  // Séparer par type
  const byType={JO:[],CHM:[],CHE:[],CDM:[]};
  courses.forEach(c=>{(byType[c.type]||byType['CDM']).push(c);});

  const section=(title,list)=>{
    if(!list.length) return '';
    const items=list.map(c=>{
      const cls=rangColor(c.rang);
      const isSel=SEL_COURSE===c.sheet;
      return '<div class="ritem'+(isSel?' selected':'')+'" onclick="selectCourse(\''+c.sheet+'\')">'
        +'<span class="rrank '+cls+'">'+c.rang+'</span>'
        +'<span class="rcourse">'+c.label+'</span>'
        +typeBadge(c.type)
        +'<span style="font-size:10px;color:#aaa;flex-shrink:0">'+c.nb_tours+'T ▶</span>'
        +'</div>';
    }).join('');
    return '<div class="sect"><div class="sect-title">'+title+'</div><div class="rlist">'+items+'</div></div>';
  };

  document.getElementById('fiche-content').innerHTML=
    '<div class="fiche">'+
    section('🏅 Jeux Olympiques',byType.JO)+
    section('🌍 Championnats du Monde',byType.CHM)+
    section('🇪🇺 Championnats d\'Europe',byType.CHE)+
    section('🌊 Coupes du Monde ('+byType.CDM.length+')',byType.CDM)+
    '</div>';
}

function selectCourse(sheet){
  SEL_COURSE=sheet;
  PANEL_VIEW='course-detail';
  const ng=data().find(x=>x.bib===SEL);
  if(ng) setPanelView('course-detail',ng);
}

// ── DÉTAIL COURSE (graphique positions tour par tour) ─────────
function renderCourseDetail(ng, sheet){
  const c=ng.courses.find(x=>x.sheet===sheet);
  if(!c){
    document.getElementById('fiche-content').innerHTML='<div class="fiche"><div class="empty-r">Course introuvable</div></div>';
    return;
  }

  const rangCls=rangColor(c.rang);
  const distCumul=[]; let cumul=0;
  c.dists.forEach(d=>{cumul+=d;distCumul.push(Math.round(cumul/100)/10);});

  // Graphique SVG positions + vitesses
  const W=320, H=160;
  const padL=32, padR=12, padT=12, padB=28;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const nb=c.positions_tour.length;

  // Positions valides
  const validPos=c.positions_tour.filter(p=>p!=null);
  const posMin=validPos.length?Math.min(...validPos):1;
  const posMax=validPos.length?Math.max(...validPos,c.nb_nageurs):c.nb_nageurs;
  const yScaleP=p=>padT+((p-1)/(posMax-1))*chartH; // 1er = haut
  const xScale=i=>padL+(i/(nb-1))*chartW;

  let svgPos='<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;margin-bottom:8px">';
  svgPos+='<rect width="'+W+'" height="'+H+'" fill="#f5f8fc"/>';
  svgPos+='<rect x="'+padL+'" y="'+padT+'" width="'+chartW+'" height="'+chartH+'" fill="white" rx="2"/>';

  // Grille horizontale (positions clés)
  [1,Math.ceil(c.nb_nageurs/4),Math.ceil(c.nb_nageurs/2),Math.ceil(3*c.nb_nageurs/4),c.nb_nageurs].forEach(p=>{
    if(p<1||p>c.nb_nageurs) return;
    const y=yScaleP(p);
    svgPos+='<line x1="'+padL+'" y1="'+y+'" x2="'+(padL+chartW)+'" y2="'+y+'" stroke="#dde5f0" stroke-width="0.8"/>';
    svgPos+='<text x="'+(padL-3)+'" y="'+(y+3)+'" text-anchor="end" font-size="7" fill="#9ab0c8">'+p+'</text>';
  });
  svgPos+='<text x="'+(padL-3)+'" y="'+(padT+3)+'" text-anchor="end" font-size="7" fill="#003087" font-weight="700">1</text>';

  // Ligne de position
  const pts=c.positions_tour.map((p,i)=>p!=null?xScale(i)+','+yScaleP(p):null).filter(Boolean);
  if(pts.length>1){
    svgPos+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="#003087" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    c.positions_tour.forEach((p,i)=>{
      if(p==null) return;
      const x=xScale(i), y=yScaleP(p);
      svgPos+='<circle cx="'+x+'" cy="'+y+'" r="3" fill="'+(p===1?'#b8860b':p<=3?'#cd7c3a':p<=10?'#003087':'#7aaecf')+'"/>';
    });
  }

  // Labels tours (km cumulés)
  c.positions_tour.forEach((p,i)=>{
    if(i===0||i===nb-1||(nb>6&&i%2!==0)) return;
    const x=xScale(i);
    svgPos+='<text x="'+x+'" y="'+(padT+chartH+10)+'" text-anchor="middle" font-size="7" fill="#9ab0c8">'+distCumul[i]+'k</text>';
  });
  svgPos+='<text x="'+xScale(0)+'" y="'+(padT+chartH+10)+'" text-anchor="middle" font-size="7" fill="#9ab0c8">Dép.</text>';
  svgPos+='<text x="'+xScale(nb-1)+'" y="'+(padT+chartH+10)+'" text-anchor="middle" font-size="7" fill="#9ab0c8">Arr.</text>';

  svgPos+='<rect x="'+padL+'" y="'+padT+'" width="'+chartW+'" height="'+chartH+'" fill="none" stroke="#c5d4e8" stroke-width="0.8" rx="2"/>';
  svgPos+='</svg>';

  // Graphique vitesses par tour
  const validV=c.vitesses_tour.filter(v=>v!=null);
  let svgVit='';
  if(validV.length>1){
    const Hv=90;
    const vMin2=Math.max(1.2,Math.min(...validV)-0.05), vMax2=Math.min(2.0,Math.max(...validV)+0.05);
    const yScaleV=v=>padT+((vMax2-v)/(vMax2-vMin2))*((Hv-padT-padB));
    svgVit='<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 '+W+' '+Hv+'" style="display:block;margin-bottom:8px">';
    svgVit+='<rect width="'+W+'" height="'+Hv+'" fill="#f5f8fc"/>';
    svgVit+='<rect x="'+padL+'" y="'+padT+'" width="'+chartW+'" height="'+(Hv-padT-padB)+'" fill="white" rx="2"/>';

    // Barre de vitesse par tour
    c.vitesses_tour.forEach((v,i)=>{
      if(!v) return;
      const bw=(chartW/nb)*0.7, bx=padL+(i/nb)*chartW+((chartW/nb)*(1-0.7)/2);
      const by=padT+yScaleV(v), bh=(Hv-padT-padB)-yScaleV(v);
      svgVit+='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" rx="1"'
        +' fill="'+vColor(v)+'" opacity="0.85"/>';
    });
    svgVit+='<text x="'+(padL-3)+'" y="'+(padT+4)+'" text-anchor="end" font-size="7" fill="#6b7f9e">'+vMax2.toFixed(2)+'</text>';
    svgVit+='<text x="'+(padL-3)+'" y="'+(Hv-padB)+'" text-anchor="end" font-size="7" fill="#6b7f9e">'+vMin2.toFixed(2)+'</text>';
    svgVit+='<rect x="'+padL+'" y="'+padT+'" width="'+chartW+'" height="'+(Hv-padT-padB)+'" fill="none" stroke="#c5d4e8" stroke-width="0.8" rx="2"/>';
    svgVit+='<text x="'+(W/2)+'" y="'+(Hv-3)+'" text-anchor="middle" font-size="7" fill="#9ab0c8">Vitesse par tour (m/s)</text>';
    svgVit+='</svg>';
  }

  // Tableau résumé des tours
  const tableRows=c.positions_tour.map((p,i)=>{
    const v=c.vitesses_tour[i];
    const pCls=p===1?'color:#b8860b;font-weight:800':p<=3?'color:#cd7c3a;font-weight:700':p<=10?'color:#003087':'color:#6b7f9e';
    return '<tr style="font-size:11px">'
      +'<td style="padding:3px 6px;color:#6b7f9e">T'+( i+1)+'</td>'
      +'<td style="padding:3px 6px;text-align:right;'+pCls+'">'+(p!=null?p+'e':'—')+'</td>'
      +'<td style="padding:3px 6px;text-align:right;color:#4a5f7a">'+(v?v.toFixed(3):'—')+'</td>'
      +'<td style="padding:3px 6px;text-align:right;color:#9ab0c8">'+distCumul[i]+'km</td>'
      +'</tr>';
  }).join('');

  document.getElementById('fiche-content').innerHTML=
    '<div class="course-detail">'+
    '<div class="course-title">'+c.label+'</div>'+
    '<div class="course-meta">'+c.nb_nageurs+' nageurs · '+c.nb_tours+' tours · '+typeBadge(c.type)+'</div>'+
    '<div class="stat-row">'+
    '<div class="stat-pill"><div class="stat-val '+rangCls+'">'+c.rang+'e</div><div class="stat-lbl">Classement</div></div>'+
    '<div class="stat-pill"><div class="stat-val">'+c.nb_nageurs+'</div><div class="stat-lbl">Participants</div></div>'+
    '<div class="stat-pill"><div class="stat-val">'+(c.rang<=3?'🏅':c.rang<=10?'✅':'')+(Math.round(c.rang/c.nb_nageurs*100))+'%</div><div class="stat-lbl">Percentile</div></div>'+
    '</div>'+
    '<div class="sect"><div class="sect-title">📍 Évolution de la position</div>'+svgPos+'</div>'+
    (svgVit?'<div class="sect"><div class="sect-title">⚡ Vitesses par tour</div>'+svgVit+'</div>':'')+
    '<div class="sect"><div class="sect-title">📋 Détail par tour</div>'+
    '<table style="width:100%;border-collapse:collapse"><thead><tr style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#9ab0c8">'+
    '<th style="padding:3px 6px;text-align:left">Tour</th><th style="padding:3px 6px;text-align:right">Position</th>'+
    '<th style="padding:3px 6px;text-align:right">Vitesse</th><th style="padding:3px 6px;text-align:right">Km cumulé</th>'+
    '</tr></thead><tbody>'+tableRows+'</tbody></table></div>'+
    '<button onclick="setPanelView(\'courses\')" style="margin-top:8px;padding:6px 12px;background:var(--ffn-blue);color:#fff;border:none;border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit">◀ Retour aux courses</button>'+
    '</div>';
}

// ── Switch gender ──────────────────────────────────────────────
function switchGender(g){
  G=g; SEL=null; NOC_FILT=null; SEL_COURSE=null;
  document.getElementById('tf').className='tab'+(g==='f'?' on':'');
  document.getElementById('th').className='tab'+(g==='h'?' on':'');
  document.getElementById('fiche-content').innerHTML='';
  document.getElementById('pempty').style.display='flex';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  buildChips(); renderHist();
}

// ── Init ───────────────────────────────────────────────────────
window.addEventListener('load',()=>{setTop();switchGender('f');});
window.addEventListener('resize',()=>{setTop();renderHist();});
</script>
