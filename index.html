<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Ponton · Ibiza 2026 · 10km</title>
<style>

:root {
  --ffn-blue:#003087; --ffn-red:#C8102E; --ffn-light:#c6ddf0;
  --bg:#f0f5fb; --surf:#ffffff; --surf2:#eef3fa;
  --border:#d0dcef; --txt:#1a2a4a; --txt-dim:#6b7f9e; --txt-bright:#0a1628;
  --panel-w:min(340px,92vw);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);}
body{font-family:'Helvetica Neue',Arial,system-ui,-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}

/* HEADER */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 8px;gap:10px;
  background:var(--ffn-blue);
  border-bottom:3px solid var(--ffn-red);
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding-top:max(10px,env(safe-area-inset-top));
}
.hdr-title{font-size:clamp(13px,3.5vw,18px);font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#fff;line-height:1;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.tabs{display:flex;gap:4px;flex-shrink:0;}
.tab{
  font-size:12px;font-weight:700;text-transform:uppercase;
  padding:6px 14px;border-radius:3px;
  border:1.5px solid rgba(255,255,255,.3);
  background:transparent;color:rgba(255,255,255,.6);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.tab.on{background:var(--ffn-red);border-color:var(--ffn-red);color:#fff;}

/* FILTER BAR */
.filters{
  display:flex;align-items:center;gap:6px;flex-wrap:nowrap;
  padding:6px 14px;
  background:#e8f0f8;border-bottom:1px solid #c5d4e8;
  position:fixed;z-index:199;left:0;right:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none;}
.flabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);font-weight:700;white-space:nowrap;}
.fsel{
  background:#fff;border:1px solid #c5d4e8;
  color:var(--txt);padding:4px 8px;border-radius:3px;
  font-size:11px;cursor:pointer;font-family:inherit;
}
.chip{
  font-size:10px;padding:3px 9px;border-radius:20px;
  border:1.5px solid #c5d4e8;background:#fff;
  color:var(--txt-dim);cursor:pointer;transition:all .15s;
  white-space:nowrap;font-family:inherit;
}
.chip.on{background:var(--ffn-blue);border-color:var(--ffn-blue);color:#fff;}

/* LAYOUT */
.main-layout{
  display:flex;height:100%;
}
.left-col{
  flex:1;overflow-y:auto;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:12px 10px calc(env(safe-area-inset-bottom)+16px);
  min-width:0;
}
.ponton-info{font-size:11px;color:var(--txt-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}

/* PANEL */
.panel-overlay{position:fixed;inset:0;background:rgba(0,30,80,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
.panel-overlay.show{opacity:1;pointer-events:all;}
.panel{
  position:fixed;right:0;top:0;bottom:0;
  width:var(--panel-w);
  background:#fff;border-left:2px solid var(--ffn-blue);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  z-index:301;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:calc(env(safe-area-inset-bottom)+16px);
}
.panel.show{transform:translateX(0);}
@media(min-width:800px){
  .panel-overlay{display:none!important;}
  .panel{
    position:static;transform:none!important;
    width:0;min-width:0;flex-shrink:0;
    border-left:none;
    overflow:hidden;
    transition:width .28s cubic-bezier(.4,0,.2,1);
  }
  .panel.show{
    width:var(--panel-w);min-width:var(--panel-w);
    border-left:2px solid var(--ffn-blue);
  }
  .main-layout{overflow:hidden;}
}

.panel-close{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:var(--ffn-blue);
}
.close-label{font-size:11px;color:rgba(255,255,255,.8);font-weight:700;text-transform:uppercase;letter-spacing:.05em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.close-btn{
  background:var(--ffn-red);border:none;
  color:#fff;padding:5px 12px;border-radius:3px;
  font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;flex-shrink:0;
}

/* FICHE */
.fiche{padding:14px 14px 24px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fiche-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #dde8f5;}
.bib-badge{width:42px;height:42px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;background:var(--ffn-blue);}
.fiche-name{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--txt-bright);line-height:1.1;}
.fiche-meta{font-size:11px;color:var(--txt-dim);margin-top:3px;}
.sect-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ffn-blue);padding-bottom:5px;margin-bottom:7px;border-bottom:2px solid var(--ffn-blue);}
.sect{margin-bottom:14px;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.tcell{background:var(--surf2);border-radius:3px;padding:6px 8px;}
.tlabel{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-dim);font-weight:600;}
.tval{font-size:16px;font-weight:800;color:var(--txt-bright);margin-top:1px;}
.tval.nd{font-size:12px;color:#bbc8d8;font-weight:400;}
.exp-wrap{background:var(--surf2);border-radius:3px;padding:8px 10px;}
.exp-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;color:var(--txt);}
.exp-bar-bg{height:7px;background:#d0dce8;border-radius:3px;overflow:hidden;}
.exp-bar{height:100%;border-radius:3px;transition:width .4s ease;}
.rlist{display:flex;flex-direction:column;gap:4px;}
.ritem{display:flex;align-items:center;gap:8px;background:var(--surf2);border-radius:3px;padding:5px 8px;font-size:11px;}
.rrank{font-size:16px;font-weight:800;width:24px;text-align:center;flex-shrink:0;}
.top3{color:#b8860b;}.top10{color:var(--ffn-blue);}.other{color:#8899b0;}
.rcourse{color:var(--txt);flex:1;}
.empty-r{font-size:11px;color:#bbc8d8;font-style:italic;}
.p-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80%;gap:10px;color:var(--txt-dim);font-size:12px;text-align:center;padding:24px;}
.p-empty-icon{font-size:40px;opacity:.25;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#c5d4e8;border-radius:2px;}


.resp-badge{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:6px;padding:4px 10px;
  background:#eef3fa;border:1.5px solid #003087;border-radius:20px;
  font-size:11px;
}
.resp-icon{font-size:15px;font-weight:900;color:#003087;line-height:1;}
.resp-label{color:#003087;font-weight:600;letter-spacing:.02em;}
</style>
</head>
<body>

<div class="hdr" id="hdr">
  <div>
    <div class="hdr-title">🏊 Ponton · 10km Ibiza 2026</div>
    <div class="hdr-sub">World Cup Stop 2 · 24 avril 2026 · FFN Service Performance</div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tf" onclick="switchGender('f')">♀ Femmes</button>
    <button class="tab" id="th" onclick="switchGender('h')">♂ Hommes</button>
  </div>
</div>

<div class="filters" id="fbar">
  <span class="flabel">Tri :</span>
  <select class="fsel" id="sort" onchange="renderHist()">
    <option value="bib">BIB</option>

    <option value="v400">Vitesse 400 ↓</option>
    <option value="exp">Expérience ↓</option>
    <option value="noc">Nation</option>
  </select>
  <span class="flabel">Nation :</span>
  <div id="chips" style="display:flex;gap:4px;flex-wrap:nowrap;"></div>
</div>

<div class="main-layout" id="main-layout">

  <div class="left-col" id="left-col">
    <div class="ponton-info" id="pinfo"></div>
    <div id="hist-container" style="width:100%;min-width:600px;"></div>
  </div>

  <div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
  <div class="panel" id="panel">
    <div class="panel-close">
      <span class="close-label" id="panel-title">Fiche nageur</span>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>
    <div class="p-empty" id="pempty">
      <div class="p-empty-icon">📊</div>
      <div>Cliquez sur une barre<br>pour voir la fiche</div>
    </div>
    <div id="fiche"></div>
  </div>

</div>

let G = 'f', SEL = null, NOC_FILT = null, VIEW = 'hist';

const acc  = () => G === 'f' ? '#003087' : '#003087';
const acc2 = () => G === 'f' ? '#C8102E' : '#1a6fc4';
const data = () => G === 'f' ? DATA_F : DATA_H;

// ── FFN palette & experience color ──────────────────────────
// Expérience: 0→light blue, 80→dark navy (FFN)
function expColor(e) {
  const t = Math.min(1, (e || 0) / 80);
  // expérience 0 → bleu moyen visible #6da8d4 ; expérience 80 → bleu marine #003087
  const r = Math.round(109 - t * 109);
  const g = Math.round(168 - t * 120);
  const b = Math.round(212 - t * 76);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function isFrench(noc) { return noc === 'FRA'; }

// ── Layout heights ───────────────────────────────────────────
function setTop() {
  const hh = document.getElementById('hdr').offsetHeight;
  const fh = document.getElementById('fbar').offsetHeight;
  document.getElementById('main-layout').style.paddingTop = (hh + fh) + 'px';
  document.getElementById('fbar').style.top = hh + 'px';
}

// ── NOC Chips ────────────────────────────────────────────────
function buildChips() {
  const nocs = [...new Set(data().map(d => d.noc))].sort();
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  const mk = (lbl, noc) => {
    const b = document.createElement('button');
    const on = NOC_FILT === noc;
    b.className = 'chip' + (on ? ' on' : '');
    b.textContent = lbl;
    b.onclick = () => { NOC_FILT = NOC_FILT === noc ? null : noc; buildChips(); renderHist(); };
    wrap.appendChild(b);
  };
  mk('Tous', null);
  nocs.forEach(n => mk((NOC_FLAGS[n] || '') + ' ' + n, n));
}

// ── Sort & filter ────────────────────────────────────────────
function sorted() {
  let d = [...data()];
  if (NOC_FILT) d = d.filter(x => x.noc === NOC_FILT);
  const s = document.getElementById('sort').value;
  if (s === 'bib')   d.sort((a, b) => a.bib - b.bib);
  else if (s === 'exp')  d.sort((a, b) => (b.experience || 0) - (a.experience || 0));
  else if (s === 'v15')  d.sort((a, b) => (b.v1500 || 0) - (a.v1500 || 0));
  else if (s === 'v400') d.sort((a, b) => (b.v400 || 0) - (a.v400 || 0));
  else d.sort((a, b) => a.noc.localeCompare(b.noc) || a.bib - b.bib);
  return d;
}

// ── HISTOGRAM VIEW ───────────────────────────────────────────
function renderHist() {
  const d = sorted();
  document.getElementById('pinfo').textContent =
    d.length + ' nageur' + (G === 'h' ? 's' : 'ses') + (NOC_FILT ? ' · ' + NOC_FILT : '');

  const container = document.getElementById('hist-container');
  const W = container.clientWidth || 900;

  // Chart dimensions
  const marginL = 48, marginR = 12, marginT = 28, marginB = 170;
  const chartW = W - marginL - marginR;
  const chartH = 260;
  const svgH = chartH + marginT + marginB;

  // Scales
  const allV = d.flatMap(x => [x.v1500, x.v400].filter(v => v != null));
  const vMin = allV.length ? Math.max(1.20, Math.min(...allV) - 0.05) : 1.20;
  const vMax = allV.length ? Math.min(1.90, Math.max(...allV) + 0.05) : 1.90;

  const barW = Math.max(6, Math.min(28, (chartW / d.length) - 2));
  const gap  = chartW / d.length;

  const yScale = v => chartH - ((v - vMin) / (vMax - vMin)) * chartH;
  const xCenter = i => marginL + gap * i + gap / 2;

  // Y grid lines
  const yTicks = [];
  let tick = Math.ceil(vMin * 10) / 10;
  while (tick <= vMax + 0.001) { yTicks.push(+tick.toFixed(2)); tick = +(tick + 0.1).toFixed(2); }

  let svg = '<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 ' + W + ' ' + svgH + '" style="display:block">';

  // ── Background

  svg += '<rect width="' + W + '" height="' + svgH + '" fill="#f5f8fc"/>';
  svg += '<rect x="' + marginL + '" y="' + marginT + '" width="' + chartW + '" height="' + chartH + '" fill="white" rx="2"/>';

  // ── Y grid & labels
  yTicks.forEach(v => {
    const y = marginT + yScale(v);
    svg += '<line x1="' + marginL + '" y1="' + y + '" x2="' + (marginL + chartW) + '" y2="' + y + '" stroke="#dde5f0" stroke-width="1" stroke-dasharray="3,2"/>';
    svg += '<text x="' + (marginL - 5) + '" y="' + (y + 4) + '" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#6b7f9e">' + v.toFixed(1) + '</text>';
  });

  // ── Y axis label
  svg += '<text transform="rotate(-90,' + 16 + ',' + (marginT + chartH/2) + ')" x="16" y="' + (marginT + chartH/2) + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6b7f9e" font-weight="600">Vitesse (m/s)</text>';

  // ── Bars + dots
  d.forEach((ng, i) => {
    const cx = xCenter(i);
    const isSel = ng.bib === SEL;
    const isFR  = isFrench(ng.noc);
    const bColor = expColor(ng.experience || 0);
    const bStroke = isSel ? '#C8102E' : (isFR ? '#C8102E' : '#7aaecf');
    const bStrokeW = isSel || isFR ? 1.5 : 0.8;

    // Bar for v1500 uniquement (pas de fallback)
    if (ng.v1500) {
      const bY = marginT + yScale(ng.v1500);
      const bH = chartH - yScale(ng.v1500);
      svg += '<rect x="' + (cx - barW/2) + '" y="' + bY + '" width="' + barW + '" height="' + bH + '"'
        + ' fill="' + bColor + '" stroke="' + bStroke + '" stroke-width="' + bStrokeW + '" rx="1"'
        + ' style="cursor:pointer" onclick="tap(' + ng.bib + ')"/>';
    }

    // Dot + dashed line for v400
    if (ng.v400) {
      const dy = marginT + yScale(ng.v400);
      const baseY = ng.v1500 ? (marginT + yScale(ng.v1500)) : (marginT + chartH);
      svg += '<line x1="' + cx + '" y1="' + dy + '" x2="' + cx + '" y2="' + baseY + '" stroke="#003087" stroke-width="1" stroke-dasharray="3,2"/>';
      svg += '<circle cx="' + cx + '" cy="' + dy + '" r="3.5" fill="#003087" style="cursor:pointer" onclick="tap(' + ng.bib + ')"/>';
    }

    // French flag emoji above bar
    if (isFR) {
      const topY = ng.v1500 ? (marginT + yScale(ng.v1500) - 4) : (marginT + chartH - 4);
      svg += '<text x="' + cx + '" y="' + topY + '" text-anchor="middle" font-size="11">🇫🇷</text>';
    }

    // Selection highlight
    if (isSel) {
      svg += '<rect x="' + (cx - barW/2 - 2) + '" y="' + marginT + '" width="' + (barW + 4) + '" height="' + chartH + '" fill="rgba(200,16,46,0.08)" rx="2" pointer-events="none"/>';
    }

    // Hit area (full column, transparent)
    svg += '<rect x="' + (cx - gap/2) + '" y="' + marginT + '" width="' + gap + '" height="' + chartH + '" fill="transparent" style="cursor:pointer" onclick="tap(' + ng.bib + ')"/>';

    // BIB label under x-axis
    const lblY = marginT + chartH + 14;
    svg += '<text x="' + cx + '" y="' + lblY + '" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="' + (isSel ? '#C8102E' : '#6b7f9e') + '" font-weight="' + (isSel ? '700' : '400') + '">' + ng.bib + '</text>';

    // Name label (rotated, small)
    const nameY = marginT + chartH + 18;
    const shortName = ng.nom.length > 16 ? ng.nom.split(' ')[0] : ng.nom;
    svg += '<text transform="rotate(-55,' + cx + ',' + (nameY + 8) + ')" x="' + cx + '" y="' + (nameY + 8) + '"'
      + ' text-anchor="end" font-family="Arial,sans-serif" font-size="8.5" fill="' + (isSel ? '#C8102E' : (isFR ? '#C8102E' : '#4a5f7a')) + '"'
      + ' font-weight="' + (isFR ? '700' : '400') + '">' + shortName + '</text>';
  });

  // ── Frame
  svg += '<rect x="' + marginL + '" y="' + marginT + '" width="' + chartW + '" height="' + chartH + '" fill="none" stroke="#c5d4e8" stroke-width="1" rx="2"/>';

  // ── Legend — positionnée SOUS les noms rotatés
  const legY1 = marginT + chartH + 126;  // ligne 1 (sous les noms ~+90px)
  const legY2 = legY1 + 24;             // ligne 2
  const legX  = marginL;

  // Fond légende
  svg += '<rect x="' + (legX-4) + '" y="' + (legY1-14) + '" width="' + (chartW+8) + '" height="46" rx="4" fill="#eef3fa" stroke="#d0dce8" stroke-width="0.8"/>';

  // — Ligne 1 : Vitesse 1500 + Vitesse 400 + Français
  // Barre v1500
  svg += '<rect x="' + legX + '" y="' + (legY1-10) + '" width="12" height="12" rx="1" fill="#6da8d4" stroke="#7aaecf" stroke-width="0.8"/>';
  svg += '<text x="' + (legX+16) + '" y="' + legY1 + '" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Vitesse 1500</text>';


  // Point + tiret v400
  const sepX = legX + 240;
  svg += '<line x1="' + sepX + '" y1="' + (legY1-6) + '" x2="' + sepX + '" y2="' + (legY1+2) + '" stroke="#003087" stroke-width="1.2" stroke-dasharray="2.5,2"/>';
  svg += '<circle cx="' + sepX + '" cy="' + (legY1-8) + '" r="3.5" fill="#003087"/>';
  svg += '<text x="' + (sepX+9) + '" y="' + legY1 + '" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Vitesse 400</text>';

  // Français
  const frX = legX + 350;
  svg += '<text x="' + frX + '" y="' + legY1 + '" font-size="11">🇫🇷</text>';
  svg += '<text x="' + (frX+16) + '" y="' + legY1 + '" font-family="Arial,sans-serif" font-size="9.5" fill="#C8102E" font-weight="600">Nageur(se) français(e)</text>';

  // Cliquer
  const clkX = legX + 490;
  svg += '<text x="' + clkX + '" y="' + legY1 + '" font-family="Arial,sans-serif" font-size="9" fill="#7aaecf" font-style="italic">← cliquer sur une barre pour la fiche</text>';

  // — Ligne 2 : dégradé expérience
  const gradLabelX = legX;
  svg += '<text x="' + gradLabelX + '" y="' + legY2 + '" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Expérience :</text>';

  const gradStartX = legX + 74;
  const steps = 10;
  const stepW  = 14;
  for (let ei = 0; ei <= steps; ei++) {
    const ev = ei * 8;
    const c  = expColor(ev);
    svg += '<rect x="' + (gradStartX + ei*stepW) + '" y="' + (legY2-10) + '" width="' + stepW + '" height="10" fill="' + c + '"/>';
  }
  // Bord du gradient
  svg += '<rect x="' + gradStartX + '" y="' + (legY2-10) + '" width="' + (steps*stepW+stepW) + '" height="10" fill="none" stroke="#c0cfe0" stroke-width="0.8"/>';
  svg += '<text x="' + gradStartX + '" y="' + (legY2+8) + '" font-family="Arial,sans-serif" font-size="8" fill="#6b7f9e">0 course</text>';
  svg += '<text x="' + (gradStartX + steps*stepW + stepW) + '" y="' + (legY2+8) + '" font-family="Arial,sans-serif" font-size="8" fill="#003087" font-weight="600" text-anchor="end">80+ courses</text>';

  svg += '</svg>';
  container.innerHTML = svg;
}

// ── Tap / select ─────────────────────────────────────────────
function tap(bib) {
  SEL = SEL === bib ? null : bib;
  renderHist();
  if (SEL) {
    const ng = data().find(x => x.bib === SEL);
    if (ng) showFiche(ng);
  } else {
    closePanel();
  }
}

function closePanel() {
  SEL = null;
  renderHist();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  document.getElementById('fiche').innerHTML = '';
  document.getElementById('pempty').style.display = 'flex';
}

// ── Fiche ─────────────────────────────────────────────────────
function showFiche(ng) {
  const A = '#C8102E';
  const flag = NOC_FLAGS[ng.noc] || '';
  const annee = ng.annee || '—';
  const age = ng.annee ? (2026 - ng.annee) + ' ans' : '';
  const isF = G === 'f';
  const expPct = Math.min(100, (ng.experience || 0) / 80 * 100);

  const tcell = (lbl, v) =>
    '<div class="tcell"><div class="tlabel">' + lbl + '</div><div class="tval' + (v ? '' : ' nd') + '">' + (v || '—') + '</div></div>';

  const vtcell = (lbl, v) =>
    v ? '<div class="tcell" style="border:1px solid #003087;background:#eef3fa"><div class="tlabel">' + lbl + '</div><div class="tval" style="color:#003087">' + v.toFixed(4) + '</div></div>' : '';

  const times = isF
    ? tcell('100 NL', ng.t100) + tcell('200 NL', ng.t200) + tcell('400 NL', ng.t400) + tcell('800 NL', ng.t800) + tcell('1500 NL', ng.t1500) + vtcell('Vitesse 400', ng.v400) + vtcell('Vitesse 1500', ng.v1500)
    : tcell('400 NL', ng.t400) + tcell('800 NL', ng.t800) + tcell('1500 NL', ng.t1500) + vtcell('Vitesse 400', ng.v400) + vtcell('Vitesse 1500', ng.v1500);

  const rl = (list, empty) => list.length ? list.map(r => {
    const cls = r.rang <= 3 ? 'top3' : r.rang <= 10 ? 'top10' : 'other';
    return '<div class="ritem"><span class="rrank ' + cls + '">' + r.rang + '</span><span class="rcourse">' + r.course + '</span></div>';
  }).join('') : '<div class="empty-r">' + empty + '</div>';

  // Respiration
  let respHtml = '';
  if (ng.respiration) {
    const icon = ng.respiration.includes('Gauche et') ? '↔' : ng.respiration.includes('Gauche') ? '←' : '→';
    respHtml = '<div class="resp-badge"><span class="resp-icon">' + icon + '</span><span class="resp-label">Respiration ' + ng.respiration + '</span></div>';
  }
  document.getElementById('panel-title').textContent = ng.nom;
  document.getElementById('pempty').style.display = 'none';
  document.getElementById('fiche').innerHTML =
    '<div class="fiche">' +
    '<div class="fiche-hdr">' +
    '<div class="bib-badge">' + ng.bib + '</div>' +
    '<div><div class="fiche-name">' + ng.nom + '</div>' +
    '<div class="fiche-meta">' + flag + ' ' + ng.noc + (annee !== '—' ? ' · ' + annee + (age ? ' (' + age + ')' : '') : '') + '</div>' + respHtml + '</div>' +
    '</div>' +
    '<div class="sect"><div class="sect-title">⏱ Temps piscine</div><div class="tgrid">' + times + '</div></div>' +
    '<div class="sect"><div class="sect-title">📊 Expérience eau libre</div>' +
    '<div class="exp-wrap"><div class="exp-row"><span>' + (ng.experience || 0) + ' courses</span><span style="font-size:10px;color:#aaa">/ 80 ref.</span></div>' +
    '<div class="exp-bar-bg"><div class="exp-bar" style="width:' + expPct + '%;background:linear-gradient(90deg,#c6ddf0,#003087)"></div></div></div></div>' +
    '<div class="sect"><div class="sect-title">🏆 ChM · ChE · JO</div><div class="rlist">' + rl(ng.resultats_chm, 'Aucun résultat') + '</div></div>' +
    '<div class="sect"><div class="sect-title">🌊 Coupes du Monde</div><div class="rlist">' + rl(ng.resultats_cdm, 'Aucun résultat') + '</div></div>' +
    '</div>';

  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
}

// ── Switch gender ─────────────────────────────────────────────
function switchGender(g) {
  G = g; SEL = null; NOC_FILT = null;
  document.getElementById('tf').className = 'tab' + (g === 'f' ? ' on' : '');
  document.getElementById('th').className = 'tab' + (g === 'h' ? ' on' : '');
  document.getElementById('fiche').innerHTML = '';
  document.getElementById('pempty').style.display = 'flex';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  buildChips();
  renderHist();
}

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('load', () => { setTop(); switchGender('f'); });
window.addEventListener('resize', () => { setTop(); renderHist(); });

</script>
