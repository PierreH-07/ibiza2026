
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ponton KO · Ibiza 2026 · 3km Sprint</title>
<style>
:root{
  --ffn-blue:#003087;--ffn-red:#C8102E;--ffn-light:#c6ddf0;
  --bg:#f0f5fb;--surf:#fff;--surf2:#eef3fa;--surf3:#e4edf8;
  --border:#d0dce8;--txt:#1a2a4a;--txt-dim:#6b7f9e;--txt-bright:#0a1628;
  --gold:#b8860b;--panel-w:min(360px,92vw);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);}
body{font-family:'Helvetica Neue',Arial,system-ui,-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}

.hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:max(env(safe-area-inset-top),10px) 16px 8px;
  background:var(--ffn-blue);border-bottom:3px solid var(--ffn-red);
  position:fixed;top:0;left:0;right:0;z-index:300;}
.hdr-title{font-size:clamp(12px,3.5vw,17px);font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#fff;line-height:1;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}
.tabs{display:flex;gap:4px;flex-shrink:0;}
.tab{font-size:12px;font-weight:700;text-transform:uppercase;padding:6px 13px;border-radius:3px;
  border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.55);cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab.on{background:var(--ffn-red);border-color:var(--ffn-red);color:#fff;}

.serie-tabs{display:flex;background:#002070;position:fixed;z-index:299;left:0;right:0;border-bottom:2px solid var(--ffn-red);gap:8px;padding:6px 14px;}
.serie-tab{
  flex:1;text-align:center;padding:8px 6px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
  color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;
  border-radius:4px;border:2px solid transparent;background:transparent;
}
.serie-tab.on{color:#fff;background:var(--ffn-red);border-color:var(--ffn-red);}
.serie-tab:hover:not(.on){background:rgba(255,255,255,.1);color:#fff;}

.filters{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;padding:6px 14px;
  background:#e8f0f8;border-bottom:1px solid var(--border);
  position:fixed;z-index:298;left:0;right:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.flabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);font-weight:700;white-space:nowrap;}
.fsel{background:var(--surf);border:1px solid var(--border);color:var(--txt);padding:4px 8px;border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit;}
.chip{font-size:10px;padding:3px 9px;border-radius:20px;border:1.5px solid var(--border);background:var(--surf);
  color:var(--txt-dim);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.chip.on{background:var(--ffn-blue);border-color:var(--ffn-blue);color:#fff;}

.main-layout{display:flex;height:100%;}
.left-col{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 10px calc(env(safe-area-inset-bottom)+20px);}
.ponton-info{font-size:11px;color:var(--txt-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}

.panel-overlay{position:fixed;inset:0;background:rgba(0,30,80,.45);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;}
.panel-overlay.show{opacity:1;pointer-events:all;}
.panel{position:fixed;right:0;top:0;bottom:0;width:var(--panel-w);background:var(--surf);
  border-left:2px solid var(--ffn-blue);overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:401;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  padding-bottom:calc(env(safe-area-inset-bottom)+16px);}
.panel.show{transform:translateX(0);}
@media(min-width:820px){
  .panel-overlay{display:none!important;}
  .panel{position:static;transform:none!important;width:0;min-width:0;flex-shrink:0;border-left:none;overflow:hidden;transition:width .28s cubic-bezier(.4,0,.2,1);}
  .panel.show{width:var(--panel-w);min-width:var(--panel-w);border-left:2px solid var(--ffn-blue);overflow:auto;}
  .main-layout{overflow:hidden;}
}
.panel-close{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--ffn-blue);}
.close-label{font-size:11px;color:rgba(255,255,255,.8);font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
.close-btn{background:var(--ffn-red);border:none;color:#fff;padding:5px 12px;border-radius:3px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;flex-shrink:0;}

.panel-vtabs{display:flex;background:var(--surf3);border-bottom:1px solid var(--border);}
.panel-vtab{flex:1;padding:8px 4px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt-dim);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;}
.panel-vtab.on{color:var(--ffn-blue);border-bottom-color:var(--ffn-blue);}

.fiche{padding:14px 14px 24px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fiche-hdr{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.bib-badge{width:42px;height:42px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;background:var(--ffn-blue);}
.fiche-name{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:var(--txt-bright);line-height:1.1;}
.fiche-meta{font-size:11px;color:var(--txt-dim);margin-top:3px;}
.resp-badge{display:inline-flex;align-items:center;gap:5px;margin-top:5px;padding:3px 9px;background:var(--surf2);border:1.5px solid var(--ffn-blue);border-radius:20px;font-size:11px;}
.resp-icon{font-size:14px;font-weight:900;color:var(--ffn-blue);}
.resp-label{color:var(--ffn-blue);font-weight:600;}
.sect-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ffn-blue);padding-bottom:5px;margin-bottom:7px;border-bottom:2px solid var(--ffn-blue);}
.sect{margin-bottom:14px;}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.tcell{background:var(--surf2);border-radius:3px;padding:6px 8px;}
.tlabel{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt-dim);font-weight:600;}
.tval{font-size:16px;font-weight:800;color:var(--txt-bright);margin-top:1px;}
.tval.nd{font-size:12px;color:#bbc8d8;font-weight:400;}
.exp-wrap{background:var(--surf2);border-radius:3px;padding:8px 10px;}
.exp-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;color:var(--txt);}
.exp-bar-bg{height:7px;background:var(--border);border-radius:3px;overflow:hidden;}
.exp-bar{height:100%;border-radius:3px;transition:width .4s ease;}
.stat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.stat-pill{background:var(--surf2);border-radius:4px;padding:6px 10px;text-align:center;flex:1;min-width:60px;}
.stat-val{font-size:18px;font-weight:800;color:var(--txt-bright);}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-dim);margin-top:2px;}
.top1c{color:var(--gold);} .top3c{color:#cd7c3a;} .top10c{color:var(--ffn-blue);}

/* KO history */
.ko-table{width:100%;border-collapse:collapse;font-size:11px;}
.ko-table th{background:var(--ffn-blue);color:#fff;padding:5px 8px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:.08em;}
.ko-table th:first-child{text-align:left;}
.ko-table td{padding:4px 8px;border-bottom:1px solid var(--border);text-align:center;}
.ko-table td:first-child{text-align:left;font-weight:600;}
.ko-table tr:nth-child(even) td{background:var(--surf2);}
.rang-badge{display:inline-block;min-width:22px;padding:2px 5px;border-radius:3px;font-weight:800;font-size:12px;}
.rb-1{background:#fef3c7;color:#92400e;} .rb-2{background:#f3f4f6;color:#374151;} .rb-3{background:#fdf2f2;color:#c53030;}
.rb-top{background:#eef3fa;color:var(--ffn-blue);} .rb-out{color:#aaa;}

/* Progression chart */
.prog-chart{display:block;width:100%;height:auto;}

.p-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:10px;color:var(--txt-dim);font-size:12px;text-align:center;padding:24px;}
.p-empty-icon{font-size:40px;opacity:.2;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>

  </div>
</div>

 G='f', SEL=null, NOC_FILT=null, SERIE=1, PANEL_VIEW='profil';

const data = () => {
  const all = G==='f' ? DATA_F : DATA_H;
  return all.filter(d => d.serie === SERIE);
};
const allData = () => G==='f' ? DATA_F : DATA_H;
const nbSeries = () => Math.max(...allData().map(d=>d.serie||1));

function expColor(e){
  const t=Math.min(1,(e||0)/80);
  return 'rgb('+Math.round(109-t*109)+','+Math.round(168-t*120)+','+Math.round(212-t*76)+')';
}
function vColor(v,g){
  if(!v) return '#6da8d4';
  const max=g==='f'?1.65:1.82, min=g==='f'?1.35:1.50;
  const t=Math.max(0,Math.min(1,(v-min)/(max-min)));
  return 'rgb('+Math.round(230-t*190)+','+Math.round(48+t*60)+','+Math.round(90+t*165)+')';
}
function rangCls(r){return r===1?'top1c':r<=3?'top3c':r<=10?'top10c':'';}
function typeBadge(type){
  const c={CDM:'#eef3fa',CHM:'#fff3e0',JO:'#ffe0e0',CHE:'#e0f5e0'}[type]||'#eef3fa';
  const t={CDM:type,CHM:type,JO:type,CHE:type}[type]||type;
  return '<span style="font-size:9px;padding:2px 5px;border-radius:10px;background:'+c+';font-weight:700;">'+t+'</span>';
}

function setTop(){
  const hh=document.getElementById('hdr').offsetHeight;
  const sh=document.getElementById('serie-tabs').offsetHeight;
  const fh=document.getElementById('fbar').offsetHeight;
  const total=hh+sh+fh;
  document.getElementById('main-layout').style.paddingTop=total+'px';
  document.getElementById('serie-tabs').style.top=hh+'px';
  document.getElementById('fbar').style.top=(hh+sh)+'px';
}

function buildChips(){
  const d=data();
  const nocs=[...new Set(d.map(x=>x.noc))].sort();
  const wrap=document.getElementById('chips');
  wrap.innerHTML='';
  const mk=(lbl,noc)=>{
    const b=document.createElement('button');
    b.className='chip'+(NOC_FILT===noc?' on':'');
    b.textContent=lbl;
    b.onclick=()=>{NOC_FILT=NOC_FILT===noc?null:noc;buildChips();renderHist();};
    wrap.appendChild(b);
  };
  mk('Tous',null);
  nocs.forEach(n=>mk((NOC_FLAGS[n]||'')+' '+n,n));
}

function sorted(){
  let d=[...data()];
  if(NOC_FILT) d=d.filter(x=>x.noc===NOC_FILT);
  const s=document.getElementById('sort').value;
  if(s==='bib') d.sort((a,b)=>a.bib-b.bib);
  else if(s==='v15') d.sort((a,b)=>(b.v1500||0)-(a.v1500||0));
  else if(s==='v400') d.sort((a,b)=>(b.v400||0)-(a.v400||0));
  else if(s==='exp') d.sort((a,b)=>(b.experience||0)-(a.experience||0));
  else d.sort((a,b)=>a.noc.localeCompare(b.noc)||a.bib-b.bib);
  return d;
}

function renderHist(){
  const d=sorted();
  const nb=nbSeries();
  const sCount=Array.from({length:nb},(_,i)=>allData().filter(x=>x.serie===i+1).length);
  document.getElementById('ponton-info').textContent=
    d.length+' nageur'+(G==='h'?'s':'ses')+(NOC_FILT?' · '+NOC_FILT:'');
  document.getElementById('serie-count').textContent=
    sCount.map((n,i)=>'Série '+(i+1)+' : '+n).join(' | ');

  const container=document.getElementById('hist-container');
  const W=Math.max(container.clientWidth||600, d.length*12+80);
  const marginL=48,marginR=12,marginT=28,marginB=170;
  const chartW=W-marginL-marginR, chartH=240;
  const svgH=chartH+marginT+marginB;

  const allV=d.flatMap(x=>[x.v1500,x.v400].filter(v=>v!=null));
  const vMin=allV.length?Math.max(1.20,Math.min(...allV)-0.05):1.20;
  const vMax=allV.length?Math.min(1.90,Math.max(...allV)+0.05):1.90;
  const barW=Math.max(6,Math.min(28,(chartW/d.length)-2));
  const gap=chartW/d.length;
  const yScale=v=>chartH-((v-vMin)/(vMax-vMin))*chartH;
  const xCenter=i=>marginL+gap*i+gap/2;

  const yTicks=[];
  let tick=Math.ceil(vMin*10)/10;
  while(tick<=vMax+0.001){yTicks.push(+tick.toFixed(2));tick=+(tick+0.1).toFixed(2);}

  let svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" viewBox="0 0 '+W+' '+svgH+'" style="display:block">';
  svg+='<rect width="'+W+'" height="'+svgH+'" fill="#f5f8fc"/>';
  svg+='<rect x="'+marginL+'" y="'+marginT+'" width="'+chartW+'" height="'+chartH+'" fill="white" rx="2"/>';

  yTicks.forEach(v=>{
    const y=marginT+yScale(v);
    svg+='<line x1="'+marginL+'" y1="'+y+'" x2="'+(marginL+chartW)+'" y2="'+y+'" stroke="#dde5f0" stroke-width="1" stroke-dasharray="3,2"/>';
    svg+='<text x="'+(marginL-5)+'" y="'+(y+4)+'" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#6b7f9e">'+v.toFixed(1)+'</text>';
  });
  svg+='<text transform="rotate(-90,16,'+(marginT+chartH/2)+')" x="16" y="'+(marginT+chartH/2)+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6b7f9e" font-weight="600">Vitesse (m/s)</text>';

  d.forEach((ng,i)=>{
    const cx=xCenter(i);
    const isSel=ng.bib===SEL;
    const isFR=ng.noc==='FRA';
    const bColor=expColor(ng.experience||0);
    const bStroke=isSel?'#C8102E':isFR?'#C8102E':'#7aaecf';
    const bStrokeW=isSel||isFR?1.5:0.8;

    if(ng.v1500){
      const bY=marginT+yScale(ng.v1500), bH=chartH-yScale(ng.v1500);
      svg+='<rect x="'+(cx-barW/2)+'" y="'+bY+'" width="'+barW+'" height="'+bH+'"'
        +' fill="'+bColor+'" stroke="'+bStroke+'" stroke-width="'+bStrokeW+'" rx="1"'
        +' style="cursor:pointer" onclick="tap('+ng.bib+')"/>';
    }
    if(ng.v400){
      const dy=marginT+yScale(ng.v400);
      const baseY=ng.v1500?(marginT+yScale(ng.v1500)):(marginT+chartH);
      svg+='<line x1="'+cx+'" y1="'+dy+'" x2="'+cx+'" y2="'+baseY+'" stroke="#003087" stroke-width="1" stroke-dasharray="3,2"/>';
      svg+='<circle cx="'+cx+'" cy="'+dy+'" r="3.5" fill="#003087" style="cursor:pointer" onclick="tap('+ng.bib+')"/>';
    }
    if(isFR){
      const topY2=ng.v1500?(marginT+yScale(ng.v1500)-4):(marginT+chartH-4);
      svg+='<text x="'+cx+'" y="'+topY2+'" text-anchor="middle" font-size="10">🇫🇷</text>';
    }
    if(isSel) svg+='<rect x="'+(cx-barW/2-2)+'" y="'+marginT+'" width="'+(barW+4)+'" height="'+chartH+'" fill="rgba(200,16,46,0.06)" rx="2"/>';
    svg+='<rect x="'+(cx-gap/2)+'" y="'+marginT+'" width="'+gap+'" height="'+chartH+'" fill="transparent" style="cursor:pointer" onclick="tap('+ng.bib+')"/>';

    const lblY=marginT+chartH+14;
    svg+='<text x="'+cx+'" y="'+lblY+'" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="'+(isSel?'#C8102E':'#6b7f9e')+'" font-weight="'+(isSel?'700':'400')+'">'+ng.bib+'</text>';
    const sn=ng.nom.length>16?ng.nom.split(' ')[0]:ng.nom;
    const nameY=marginT+chartH+22;
    svg+='<text transform="rotate(-55,'+cx+','+(nameY+8)+')" x="'+cx+'" y="'+(nameY+8)+'"'
      +' text-anchor="end" font-family="Arial,sans-serif" font-size="8.5" fill="'+(isSel?'#C8102E':isFR?'#C8102E':'#4a5f7a')+'"'
      +' font-weight="'+(isFR?'700':'400')+'">'+sn+'</text>';
  });
  svg+='<rect x="'+marginL+'" y="'+marginT+'" width="'+chartW+'" height="'+chartH+'" fill="none" stroke="#c5d4e8" stroke-width="1" rx="2"/>';

  // Légende
  const legY1=marginT+chartH+126, legY2=legY1+24, legX=marginL;
  svg+='<rect x="'+(legX-4)+'" y="'+(legY1-14)+'" width="'+(chartW+8)+'" height="46" rx="4" fill="#eef3fa" stroke="#d0dce8" stroke-width="0.8"/>';
  svg+='<rect x="'+legX+'" y="'+(legY1-10)+'" width="12" height="12" rx="1" fill="#6da8d4" stroke="#7aaecf" stroke-width="0.8"/>';
  svg+='<text x="'+(legX+16)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Vitesse 1500</text>';
  const sepX=legX+120;
  svg+='<line x1="'+sepX+'" y1="'+(legY1-6)+'" x2="'+sepX+'" y2="'+(legY1+2)+'" stroke="#003087" stroke-width="1.2" stroke-dasharray="2.5,2"/>';
  svg+='<circle cx="'+sepX+'" cy="'+(legY1-8)+'" r="3.5" fill="#003087"/>';
  svg+='<text x="'+(sepX+9)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Vitesse 400</text>';

  svg+='<text x="'+(legX+340)+'" y="'+legY1+'" font-size="10">🇫🇷</text>';
  svg+='<text x="'+(legX+354)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9.5" fill="#C8102E" font-weight="600">Français(e)</text>';
  svg+='<text x="'+legX+'" y="'+legY2+'" font-family="Arial,sans-serif" font-size="9.5" fill="#1a2a4a" font-weight="600">Expérience :</text>';
  const gradX=legX+74, steps=10, stepW=14;
  for(let ei=0;ei<=steps;ei++){svg+='<rect x="'+(gradX+ei*stepW)+'" y="'+(legY2-10)+'" width="'+stepW+'" height="10" fill="'+expColor(ei*8)+'"/>';}
  svg+='<rect x="'+gradX+'" y="'+(legY2-10)+'" width="'+(steps*stepW+stepW)+'" height="10" fill="none" stroke="#c0cfe0" stroke-width="0.8"/>';
  svg+='<text x="'+gradX+'" y="'+(legY2+8)+'" font-family="Arial,sans-serif" font-size="8" fill="#6b7f9e">0</text>';
  svg+='<text x="'+(gradX+steps*stepW+stepW)+'" y="'+(legY2+8)+'" font-family="Arial,sans-serif" font-size="8" fill="#003087" font-weight="600" text-anchor="end">80+</text>';
  svg+='<text x="'+(legX+350)+'" y="'+legY1+'" font-family="Arial,sans-serif" font-size="9" fill="#7aaecf" font-style="italic">← cliquer pour la fiche</text>';
  svg+='</svg>';

  container.innerHTML=svg;
  container.style.minWidth=W+'px';
}

function tap(bib){
  const ng=allData().find(x=>x.bib===bib);
  if(!ng) return;
  if(SEL===bib){closePanel();return;}
  SEL=bib; PANEL_VIEW='profil';
  renderHist();
  showPanel(ng);
}

function closePanel(){
  SEL=null; renderHist();
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  document.getElementById('fiche-content').innerHTML='';
  document.getElementById('pempty').style.display='flex';
}

function showPanel(ng){
  document.getElementById('panel-title').textContent=ng.nom;
  document.getElementById('pempty').style.display='none';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
  setPanelView(PANEL_VIEW, ng);
}

function setPanelView(view, ngArg){
  PANEL_VIEW=view;
  const ng=ngArg||(allData().find(x=>x.bib===SEL));
  if(!ng) return;
  ['profil','ko-hist'].forEach(v=>{
    const el=document.getElementById('pvtab-'+v);
    if(el) el.classList.toggle('on',v===view);
  });
  if(view==='profil') renderProfil(ng);
  else if(view==='ko-hist') renderKOHist(ng);
}

function renderProfil(ng){
  const flag=NOC_FLAGS[ng.noc]||'';
  const annee=ng.annee||'—';
  const age=ng.annee?(2026-ng.annee)+' ans':'';
  const isF=G==='f';
  const expPct=Math.min(100,(ng.experience||0)/80*100);
  const ko=ng.ko_hist||[];
  const nbFin=ko.filter(k=>k.rang_finale!=null).length;
  const nbPodium=ko.filter(k=>k.rang_finale!=null&&k.rang_finale<=3).length;
  const rangMoyF=nbFin>0?Math.round(ko.filter(k=>k.rang_finale!=null).reduce((s,k)=>s+k.rang_finale,0)/nbFin):null;

  const tcell=(l,v)=>'<div class="tcell"><div class="tlabel">'+l+'</div><div class="tval'+(v?'':' nd')+'">'+(v||'—')+'</div></div>';
  const vtcell=(l,v)=>v?'<div class="tcell" style="border:1px solid #003087;background:#eef3fa"><div class="tlabel">'+l+'</div><div class="tval" style="color:#003087">'+v.toFixed(4)+'</div></div>':'';
  const times=isF
    ?tcell('100 NL',ng.t100)+tcell('200 NL',ng.t200)+tcell('400 NL',ng.t400)+tcell('800 NL',ng.t800)+tcell('1500 NL',ng.t1500)+vtcell('V. 400',ng.v400)+vtcell('V. 1500',ng.v1500)
    :tcell('400 NL',ng.t400)+tcell('800 NL',ng.t800)+tcell('1500 NL',ng.t1500)+vtcell('V. 400',ng.v400)+vtcell('V. 1500',ng.v1500);

  const respHtml=ng.respiration?('<div class="resp-badge"><span class="resp-icon">'+(ng.respiration.includes('Gauche et')?'↔':ng.respiration.includes('Gauche')?'←':'→')+'</span><span class="resp-label">Respiration '+ng.respiration+'</span></div>'):'';

  document.getElementById('fiche-content').innerHTML=
    '<div class="fiche">'+
    '<div class="fiche-hdr"><div class="bib-badge">'+ng.bib+'</div>'+
    '<div><div class="fiche-name">'+ng.nom+'</div>'+
    '<div class="fiche-meta">'+flag+' '+ng.noc+(annee!=='—'?' · '+annee+(age?' ('+age+')':''):'')+'</div>'+
    respHtml+'</div></div>'+
    '<div class="sect"><div class="sect-title">🏊 Stats KO</div>'+
    '<div class="stat-row">'+
    '<div class="stat-pill"><div class="stat-val">'+ko.length+'</div><div class="stat-lbl">KO joués</div></div>'+
    (nbFin?'<div class="stat-pill"><div class="stat-val top10c">'+nbFin+'</div><div class="stat-lbl">Finales</div></div>':'')+
    (nbPodium?'<div class="stat-pill"><div class="stat-val top3c">'+nbPodium+'</div><div class="stat-lbl">Podiums</div></div>':'')+
    (rangMoyF?'<div class="stat-pill"><div class="stat-val">'+rangMoyF+'e</div><div class="stat-lbl">Rang moy. finale</div></div>':'')+
    '</div></div>'+
    '<div class="sect"><div class="sect-title">⏱ Vitesse piscine</div><div class="tgrid">'+times+'</div></div>'+
    '<div class="sect"><div class="sect-title">📈 Expérience</div>'+
    '<div class="exp-wrap"><div class="exp-row"><span>'+(ng.experience||0)+' courses EL</span><span style="font-size:10px;color:#aaa">/ 80 ref.</span></div>'+
    '<div class="exp-bar-bg"><div class="exp-bar" style="width:'+expPct+'%;background:linear-gradient(90deg,#c6ddf0,#003087)"></div></div>'+
    '</div></div>'+
    '</div>';
}

function renderKOHist(ng){
  const ko=ng.ko_hist||[];
  if(!ko.length){
    document.getElementById('fiche-content').innerHTML='<div class="fiche"><p style="color:#aaa;font-size:11px;font-style:italic">Pas d\'historique KO dans la base.</p></div>';
    return;
  }

  // Tableau des rangs par manche
  const rows=ko.map(k=>{
    const rs=k.rang_series!=null?'<span class="rang-badge rb-top">'+k.rang_series+'e</span>':'<span class="rang-badge rb-out">—</span>';
    const rd=k.rang_demi!=null?'<span class="rang-badge rb-top">'+k.rang_demi+'e</span>':'<span class="rang-badge rb-out">DNS/—</span>';
    const rf=k.rang_finale!=null
      ?'<span class="rang-badge '+(k.rang_finale===1?'rb-1':k.rang_finale<=3?'rb-3':'rb-top')+'">'+k.rang_finale+'e</span>'
      :'<span class="rang-badge rb-out">—</span>';
    return '<tr><td>'+typeBadge(k.type)+' '+k.label+'</td><td>'+rs+'</td><td>'+rd+'</td><td>'+rf+'</td></tr>';
  }).join('');

  // Graphique de progression
  const W=300, H=140, padL=28, padR=10, padT=16, padB=24;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const MANCHES=['Séries','Demi','Finale'];
  const MX=[0,1,2];

  // Max rang
  const allRangs=ko.flatMap(k=>[k.rang_series,k.rang_demi,k.rang_finale].filter(r=>r!=null));
  const posMax=Math.max(...allRangs,10);
  const yS=p=>padT+((p-1)/(posMax-1))*chartH;
  const xM=i=>padL+(i/2)*chartW;

  let prog='<svg xmlns="http://www.w3.org/2000/svg" class="prog-chart" viewBox="0 0 '+W+' '+H+'">';
  prog+='<rect width="'+W+'" height="'+H+'" fill="#f5f8fc"/>';
  prog+='<rect x="'+padL+'" y="'+padT+'" width="'+chartW+'" height="'+chartH+'" fill="white" rx="2"/>';

  // Grille horizontale
  [1,3,5,10,posMax].forEach(p=>{if(p>posMax)return;
    const y=yS(p);
    prog+='<line x1="'+padL+'" y1="'+y+'" x2="'+(padL+chartW)+'" y2="'+y+'" stroke="#dde5f0" stroke-width="0.8"/>';
    prog+='<text x="'+(padL-2)+'" y="'+(y+3)+'" text-anchor="end" font-size="7" fill="#9ab0c8">'+p+'</text>';
  });

  // Ligne MOYENNE des rangs par manche
  const moyS=ko.filter(k=>k.rang_series!=null);
  const moyD=ko.filter(k=>k.rang_demi!=null);
  const moyF=ko.filter(k=>k.rang_finale!=null);
  const avgS=moyS.length?moyS.reduce((s,k)=>s+k.rang_series,0)/moyS.length:null;
  const avgD=moyD.length?moyD.reduce((s,k)=>s+k.rang_demi,0)/moyD.length:null;
  const avgF=moyF.length?moyF.reduce((s,k)=>s+k.rang_finale,0)/moyF.length:null;

  const avgPts=[];
  if(avgS!=null) avgPts.push([xM(0),yS(avgS),avgS]);
  if(avgD!=null) avgPts.push([xM(1),yS(avgD),avgD]);
  if(avgF!=null) avgPts.push([xM(2),yS(avgF),avgF]);

  if(avgPts.length>=2){
    prog+='<polyline points="'+avgPts.map(p=>p[0]+','+p[1]).join(' ')+'" fill="none" stroke="#003087" stroke-width="2.5" stroke-linejoin="round"/>';
    // Zone de dispersion (min/max)
    [[moyS,0],[moyD,1],[moyF,2]].forEach(([arr,mi])=>{
      if(!arr.length) return;
      const vals=arr.map(k=>mi===0?k.rang_series:mi===1?k.rang_demi:k.rang_finale);
      const mn=Math.min(...vals), mx=Math.max(...vals);
      if(mn<mx){
        prog+='<rect x="'+(xM(mi)-6)+'" y="'+yS(mx)+'" width="12" height="'+(yS(mn)-yS(mx))+'" fill="#003087" opacity="0.12" rx="3"/>';
      }
    });
    avgPts.forEach(([x,y,r])=>{
      const col=r<=1?'#b8860b':r<=3?'#cd7c3a':r<=10?'#003087':'#6b7f9e';
      prog+='<circle cx="'+x+'" cy="'+y+'" r="5" fill="'+col+'" stroke="white" stroke-width="1.5"/>';
      prog+='<text x="'+x+'" y="'+(y-8)+'" text-anchor="middle" font-size="8" fill="'+col+'" font-weight="700">'+r.toFixed(1)+'</text>';
    });
  }
  // Mini barres pour nb de courses utilisées
  [[moyS,0,'S'],[moyD,1,'D'],[moyF,2,'F']].forEach(([arr,mi,lbl])=>{
    if(!arr.length) return;
    prog+='<text x="'+xM(mi)+'" y="'+(H-padB+2)+'" text-anchor="middle" font-size="7" fill="#9ab0c8">n='+arr.length+'</text>';
  });

  MANCHES.forEach((m,i)=>{
    prog+='<text x="'+xM(i)+'" y="'+(H-8)+'" text-anchor="middle" font-size="8" fill="#6b7f9e">'+m+'</text>';
  });
  prog+='<text x="'+(padL-2)+'" y="'+(padT+3)+'" text-anchor="end" font-size="7" fill="#003087" font-weight="700">1</text>';
  prog+='<rect x="'+padL+'" y="'+padT+'" width="'+chartW+'" height="'+chartH+'" fill="none" stroke="#c5d4e8" stroke-width="0.8" rx="2"/>';
  prog+='</svg>';

  document.getElementById('fiche-content').innerHTML=
    '<div class="fiche">'+
    '<div class="sect"><div class="sect-title">📈 Progression par manche</div>'+prog+
    '<p style="font-size:9px;color:#9ab0c8;margin-top:4px">Rang moyen par manche · Zone bleue = dispersion min/max · n = nb de courses</p></div>'+
    '<div class="sect"><div class="sect-title">📋 Historique détaillé</div>'+
    '<table class="ko-table"><thead><tr><th>Compétition</th><th>Séries</th><th>Demi</th><th>Finale</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'+
    '</div>';
}

function switchGender(g){
  G=g; SEL=null; NOC_FILT=null; SERIE=1;
  document.getElementById('tf').className='tab'+(g==='f'?' on':'');
  document.getElementById('th').className='tab'+(g==='h'?' on':'');
  buildSerieTabs();
  closePanel();
  buildChips(); renderHist();
}

function buildSerieTabs(){
  const nb=nbSeries();
  const container=document.getElementById('serie-tabs');
  container.innerHTML='';
  const labels=['🔵 Série 1','🔴 Série 2','🟢 Série 3'];
  for(let s=1;s<=nb;s++){
    const div=document.createElement('div');
    div.className='serie-tab'+(s===SERIE?' on':'');
    div.id='serie-tab-'+s;
    div.textContent=labels[s-1]||'Série '+s;
    div.onclick=(()=>{const ss=s;return()=>switchSerie(ss);})();
    container.appendChild(div);
  }
}

function switchSerie(s){
  SERIE=s; SEL=null; NOC_FILT=null;
  document.querySelectorAll('.serie-tab').forEach((el,i)=>
    el.classList.toggle('on',i+1===s));
  closePanel();
  buildChips(); renderHist();
}

window.addEventListener('load',()=>{setTop();SERIE=1;switchGender('f');});
window.addEventListener('resize',()=>{setTop();renderHist();});
</script>
